<!DOCTYPE html>
<html>

<head>
    <title>Booking Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Booking Management</h1>

    <div class="card">

        <input type="date" id="reservedDate">

        <input type="time" id="startTime">

        <input type="time" id="endTime">

        <input type="text" id="bookingFor" placeholder="Booking For">

        <input type="number" id="participants" placeholder="Expected Participants">

        <input type="text" id="requirements" placeholder="Special Requirements">

        <input type="text" id="hallId" placeholder="Hall UUID">

        <input type="text" id="userId" placeholder="User UUID">

        <button onclick="saveBooking()">Create Booking</button>

    </div>

    <div class="card">

        <button onclick="getBookings()">Load Bookings</button>

        <div id="bookingList"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
